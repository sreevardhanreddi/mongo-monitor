{% extends "base.html" %}
{% block content %}
<section>
  <div class="mb-5 flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
    <div>
      <h1 class="text-2xl font-semibold text-stone-50">Targets</h1>
      <p class="mt-1 text-sm text-stone-400">MongoDB health, connection counts, and current operation samples.</p>
    </div>
    <div class="flex flex-wrap gap-2">
      <a href="/monitors/new"
        class="inline-flex items-center justify-center rounded-md bg-stone-100 px-3 py-2 text-sm font-medium text-stone-950 hover:bg-white">Add
        target</a>
      <button id="check-all"
        class="inline-flex items-center justify-center rounded-md bg-emerald-500 px-3 py-2 text-sm font-medium text-stone-950 hover:bg-emerald-400">Check
        all now</button>
    </div>
  </div>
  <div id="monitor-grid" class="space-y-4"></div>
</section>
{% endblock %}

{% block scripts %}
<script>
  const grid = document.getElementById("monitor-grid");
  function statusBadge(state) {
    if (state === "up") return '<span class="rounded-full bg-emerald-500/15 px-2 py-1 text-xs font-medium text-emerald-300">UP</span>';
    if (state === "down") return '<span class="rounded-full bg-red-500/15 px-2 py-1 text-xs font-medium text-red-300">DOWN</span>';
    return '<span class="rounded-full bg-stone-700 px-2 py-1 text-xs font-medium text-stone-300">NEW</span>';
  }

  function renderMonitors(monitors) {
    if (!monitors.length) {
      grid.className = "";
      grid.innerHTML = '<div class="rounded-lg border border-dashed border-stone-800 p-8 text-center text-sm text-stone-400">No MongoDB targets yet.</div>';
      return;
    }
    grid.className = "space-y-4";
    grid.innerHTML = monitors.map((monitor) => {
      const status = monitor.status || {};
      const connections = monitor.latest_connection_count || {};
      const ops = monitor.latest_current_ops || {};
      return `
        <a href="/monitors/${monitor.id}" class="block min-w-0 rounded-lg border border-stone-800 bg-stone-900 p-4 hover:border-stone-700">
          <div class="flex flex-col gap-4 lg:flex-row lg:items-start lg:justify-between">
            <div class="min-w-0 lg:max-w-xl">
              <div class="flex flex-wrap items-center gap-3">
                <h2 class="truncate text-base font-semibold text-stone-50">${App.esc(monitor.name)}</h2>
                ${statusBadge(status.state)}
              </div>
              <p class="mt-1 max-h-12 overflow-hidden break-all font-mono text-xs leading-4 text-stone-500">${App.esc(monitor.display_uri || "")}</p>
              <div class="mt-4 text-xs text-stone-500">Last checked: ${App.formatDateTime(status.checked_at, { empty: "pending" })}</div>
            </div>
            <div class="grid gap-3 sm:grid-cols-2 lg:min-w-[32rem] lg:grid-cols-3">
              <div class="min-h-20 rounded-md bg-stone-950 p-3">
                <div class="text-xs text-stone-500">Latency</div>
                <div class="mt-1 break-words text-lg font-semibold text-stone-100">${status.latency_ms ? `${status.latency_ms} ms` : "--"}</div>
                <div class="mt-1 truncate text-xs text-stone-600">${App.esc(status.version || "Version unknown")}</div>
              </div>
              <div class="min-h-20 rounded-md bg-stone-950 p-3">
                <div class="text-xs text-stone-500">Connections</div>
                <div class="mt-1 break-words text-lg font-semibold text-stone-100">${connections.current ?? "--"}</div>
                <div class="mt-1 text-xs text-stone-600">Available ${connections.available ?? "--"}</div>
              </div>
              <div class="min-h-20 rounded-md bg-stone-950 p-3">
                <div class="text-xs text-stone-500">Current Ops</div>
                <div class="mt-1 break-words text-lg font-semibold text-stone-100">${ops.active_count ?? "--"}</div>
                <div class="mt-1 text-xs text-stone-600">Total ${ops.total_count ?? "--"}</div>
              </div>
            </div>
          </div>
        </a>`;
    }).join("");
  }

  async function loadMonitors() {
    const response = await fetch("/api/monitors");
    renderMonitors(await response.json());
  }

  document.getElementById("check-all").addEventListener("click", async () => {
    await fetch("/api/checks", { method: "POST" });
    setTimeout(loadMonitors, 1200);
  });

  loadMonitors();
  setInterval(loadMonitors, 10000);
</script>
{% endblock %}
