{% extends "base.html" %}
{% block head %}
<script src="https://unpkg.com/gridjs@6/dist/gridjs.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
{% endblock %}
{% block content %}
<div class="mb-5">
  <a href="/monitors/{{ monitor_id }}" class="text-sm text-stone-400 hover:text-stone-200">Back to monitor</a>
  <h1 class="mt-2 text-2xl font-semibold text-stone-50">Database Stats</h1>
  <p id="monitor-name" class="mt-1 text-sm text-stone-500"></p>
</div>
<div id="summary" class="mb-5 grid gap-4 sm:grid-cols-2 lg:grid-cols-4"></div>

<section class="mb-5 rounded-lg border border-stone-800 bg-stone-900 p-4">
  <div class="mb-3 flex flex-wrap items-center justify-between gap-3">
    <span class="text-sm font-medium text-stone-300">Storage Breakdown</span>
    <div class="flex gap-1 rounded-md border border-stone-700 p-0.5 text-xs">
      <button data-metric="total_size_bytes" class="metric-btn rounded px-2.5 py-1">Total</button>
      <button data-metric="data_size_bytes" class="metric-btn rounded px-2.5 py-1">Data</button>
      <button data-metric="storage_size_bytes" class="metric-btn rounded px-2.5 py-1">Storage</button>
      <button data-metric="index_size_bytes" class="metric-btn rounded px-2.5 py-1">Indexes</button>
    </div>
  </div>
  <div id="treemap" style="height:340px;"></div>
</section>

<section class="rounded-lg border border-stone-800 bg-stone-900 overflow-hidden">
  <div id="db-grid"></div>
</section>
{% endblock %}

{% block scripts %}
<script>
  const monitorId = "{{ monitor_id }}";
  let databases = [];
  let activeMetric = 'total_size_bytes';

  const metricLabels = {
    total_size_bytes: 'Total Size',
    data_size_bytes: 'Data Size',
    storage_size_bytes: 'Storage Size',
    index_size_bytes: 'Index Size',
  };

  // ── Treemap ───────────────────────────────────────────────────────────────

  const chart = echarts.init(document.getElementById('treemap'), null, { renderer: 'canvas' });

  const PALETTE = [
    '#059669', '#0d9488', '#0284c7', '#7c3aed',
    '#db2777', '#ea580c', '#ca8a04', '#16a34a',
  ];

  function renderTreemap() {
    const data = databases
      .map((db, i) => ({
        name: db.database_name,
        value: db[activeMetric] || 0,
        _db: db,
        itemStyle: { color: PALETTE[i % PALETTE.length] },
      }))
      .filter(d => d.value > 0)
      .sort((a, b) => b.value - a.value);

    chart.setOption({
      backgroundColor: 'transparent',
      tooltip: {
        formatter(params) {
          const db = params.data._db;
          return [
            `<b>${App.esc(db.database_name)}</b>`,
            `Total: ${App.humanBytes(db.total_size_bytes)}`,
            `Data: ${App.humanBytes(db.data_size_bytes)}`,
            `Storage: ${App.humanBytes(db.storage_size_bytes)}`,
            `Indexes: ${App.humanBytes(db.index_size_bytes)}`,
            `Collections: ${App.formatNumber(db.collections)}`,
            `Objects: ${App.formatNumber(db.objects)}`,
          ].join('<br>');
        },
      },
      series: [{
        type: 'treemap',
        width: '100%',
        height: '100%',
        roam: false,
        nodeClick: false,
        breadcrumb: { show: false },
        label: {
          show: true,
          formatter(params) {
            return `{name|${params.name}}\n{size|${App.humanBytes(params.value)}}`;
          },
          rich: {
            name: { fontSize: 13, fontWeight: 'bold', color: '#fff', lineHeight: 20 },
            size: { fontSize: 11, color: 'rgba(255,255,255,0.75)', lineHeight: 18 },
          },
        },
        upperLabel: { show: false },
        itemStyle: { borderWidth: 2, borderColor: '#1c1917', gapWidth: 2 },
        emphasis: { itemStyle: { shadowBlur: 10, shadowColor: 'rgba(0,0,0,0.5)' } },
        data,
      }],
    }, true);
  }

  chart.on('click', params => {
    if (params.data?._db) {
      window.location.href = `/monitors/${monitorId}/storage?database_name=${encodeURIComponent(params.data._db.database_name)}`;
    }
  });

  window.addEventListener('resize', () => chart.resize());

  // ── Metric toggle buttons ─────────────────────────────────────────────────

  function setActiveMetric(metric) {
    activeMetric = metric;
    document.querySelectorAll('.metric-btn').forEach(btn => {
      const active = btn.dataset.metric === metric;
      btn.className = `metric-btn rounded px-2.5 py-1 transition-colors ${active ? 'bg-emerald-600 text-white' : 'text-stone-400 hover:text-stone-200'}`;
    });
    renderTreemap();
  }

  document.querySelectorAll('.metric-btn').forEach(btn => {
    btn.addEventListener('click', () => setActiveMetric(btn.dataset.metric));
  });

  setActiveMetric('total_size_bytes');

  // ── Grid ──────────────────────────────────────────────────────────────────

  const grid = new gridjs.Grid({
    columns: [
      {
        name: 'Database',
        sort: true,
        formatter: (cell) => gridjs.html(`<a class="font-medium text-emerald-300 hover:text-emerald-200" href="/monitors/${monitorId}/storage?database_name=${encodeURIComponent(cell)}">${App.esc(cell)}</a>`),
      },
      { name: 'Collections', sort: true, formatter: (cell) => App.formatNumber(cell) },
      { name: 'Objects', sort: true, formatter: (cell) => App.formatNumber(cell) },
      { name: 'Total', sort: true, formatter: (cell) => App.humanBytes(cell) },
      { name: 'Data', sort: true, formatter: (cell) => App.humanBytes(cell) },
      { name: 'Storage', sort: true, formatter: (cell) => App.humanBytes(cell) },
      { name: 'Indexes', sort: true, formatter: (cell) => App.humanBytes(cell) },
      { name: 'Checked', sort: true, formatter: (cell) => App.formatDateTime(cell) },
    ],
    data: [],
    search: { debounceTimeout: 250 },
    sort: true,
    language: {
      search: { placeholder: 'Search databases' },
      noRecordsFound: 'No database stats yet. Run Check now to collect storage stats.',
      loading: 'Loading…',
    },
  }).render(document.getElementById('db-grid'));

  function card(label, value) {
    return `<section class="rounded-lg border border-stone-800 bg-stone-900 p-4"><div class="text-xs text-stone-500">${label}</div><div class="mt-2 text-2xl font-semibold text-stone-50">${value}</div></section>`;
  }

  async function load() {
    const [monitor, dbs] = await Promise.all([
      fetch(`/api/monitors/${monitorId}`).then(r => r.json()),
      fetch(`/api/monitors/${monitorId}/database-stats`).then(r => r.json()),
    ]);
    document.getElementById('monitor-name').textContent = monitor.name || '';

    databases = dbs;

    const summary = databases.reduce((acc, db) => {
      acc.database_count += 1;
      acc.collections += db.collections || 0;
      acc.objects += db.objects || 0;
      acc.data_size_bytes += db.data_size_bytes || 0;
      acc.storage_size_bytes += db.storage_size_bytes || 0;
      acc.index_size_bytes += db.index_size_bytes || 0;
      acc.total_size_bytes += db.total_size_bytes || 0;
      return acc;
    }, { database_count: 0, collections: 0, objects: 0, data_size_bytes: 0, storage_size_bytes: 0, index_size_bytes: 0, total_size_bytes: 0 });

    document.getElementById('summary').innerHTML = [
      card('Databases', App.formatNumber(summary.database_count)),
      card('Collections', App.formatNumber(summary.collections)),
      card('Objects', App.formatNumber(summary.objects)),
      card('Total Size', App.humanBytes(summary.total_size_bytes)),
      card('Data Size', App.humanBytes(summary.data_size_bytes)),
      card('Storage Size', App.humanBytes(summary.storage_size_bytes)),
      card('Index Size', App.humanBytes(summary.index_size_bytes)),
    ].join('');

    renderTreemap();

    const sorted = [...databases].sort((a, b) => (b.total_size_bytes || 0) - (a.total_size_bytes || 0));
    grid.updateConfig({
      data: sorted.map(db => [
        db.database_name,
        db.collections || 0,
        db.objects || 0,
        db.total_size_bytes || 0,
        db.data_size_bytes || 0,
        db.storage_size_bytes || 0,
        db.index_size_bytes || 0,
        db.checked_at,
      ]),
    }).forceRender();
  }

  load();
</script>
{% endblock %}
