services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: mongodb-monitoring-api-dev
    env_file:
      - .env
    ports:
      - "8002:8000"
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      metadata-mongodb:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: mongodb-monitoring-worker-dev
    command: celery -A core.celery_app.celery_app worker --loglevel=info
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      metadata-mongodb:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: mongodb-monitoring-beat-dev
    command: celery -A core.celery_app.celery_app beat --loglevel=info
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      metadata-mongodb:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mongodb-monitoring-redis-dev
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  metadata-mongodb:
    image: mongo:7
    container_name: mongodb-monitoring-metadata-dev
    ports:
      - "27018:27017"
    volumes:
      - ./db_data/metadata_mongodb_data_dev:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

